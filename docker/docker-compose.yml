version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: invitely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invitely
      POSTGRES_PASSWORD: invitely
      POSTGRES_DB: invitely
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invitely"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - invitely-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: invitely-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://invitely:invitely@postgres:5432/invitely
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      ADMIN_SECRET: ${ADMIN_SECRET}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
      LOG_LEVEL: info
      LOG_FORMAT: json
    ports:
      - "3001:3001"
    volumes:
      - storage_data:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - invitely-network
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: invitely-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invitely-network
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  storage_data:

networks:
  invitely-network:
    driver: bridge
